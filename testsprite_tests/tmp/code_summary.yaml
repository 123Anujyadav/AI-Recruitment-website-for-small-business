version: "2"
type: backend
tech_stack:
  - Python
  - Django
  - Django REST Framework (DRF)
  - PostgreSQL
  - Google GenAI
features:
  - name: Authentication
    description: User registration, login, logout, and self-identification
    files:
      - jobs/views.py
      - jobs/urls.py
    endpoints:
      - method: POST
        path: /api/register
        description: Register a new candidate or employer
        auth_required: false
      - method: POST
        path: /api/login
        description: Authenticate user and start session
        auth_required: false
      - method: POST
        path: /api/logout
        description: End user session
        auth_required: true
      - method: GET
        path: /api/whoami
        description: Get current user info
        auth_required: true
  - name: Job Management
    description: Feed of all jobs and employer-specific job management
    files:
      - jobs/views.py
      - jobs/models.py
    endpoints:
      - method: GET
        path: /api/jobs/feed
        description: List all available jobs
        auth_required: false
      - method: POST
        path: /api/employer/job
        description: Post a new job (Employer)
        auth_required: true
      - method: GET
        path: /api/employer/jobs
        description: List jobs posted by current employer
        auth_required: true
      - method: PUT
        path: /api/employer/job/<int:job_id>/edit
        description: Edit an existing job
        auth_required: true
  - name: Candidate Operations
    description: Profile management, job matching, and applications
    files:
      - jobs/views.py
      - jobs/ai_services.py
    endpoints:
      - method: GET
        path: /api/candidate/matched-jobs
        description: Get AI-matched jobs for current candidate
        auth_required: true
      - method: POST
        path: /api/candidate/apply
        description: Apply for a job
        auth_required: true
      - method: GET
        path: /api/candidate/profile
        description: Get or create candidate profile
        auth_required: true
  - name: AI Services
    description: Salary assessment and learning paths using Gemini
    files:
      - jobs/ai_services.py
      - jobs/views.py
    endpoints:
      - method: GET
        path: /api/candidate/job/<int:job_id>/salary-check
        description: Get AI salary assessment for a job
        auth_required: true
      - method: GET
        path: /api/candidate/job/<int:job_id>/learning-path
        description: Get AI learning path for missing skills
        auth_required: true
known_limitations: []
